<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Google Search Previews</title>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="../icons/icon48.png" alt="Logo" class="logo">
      <h1>Website Previews</h1>
    </div>
    
    <div class="content">
      <p>Enhancing your search results with live snapshots by <strong>coders.lt</strong>.</p>
      
      <div class="status-box">
        <span class="status-label">Engine</span>
        <span class="status-value active">Active</span>
      </div>
      
      <button id="refresh-previews" class="primary-btn">Refresh Active Results</button>
      
      <div class="footer-msg">
        <p>Preview service by <strong>coders.lt</strong></p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
